const cardsContainer = document.getElementById('cards');
const searchInput = document.getElementById('search');
const refreshButton = document.getElementById('refresh');
const dailyQuoteElement = document.getElementById('dailyQuote');
const wordsPerPage = 9;
let currentBatch = [];

function updateDailyQuote() {
  if(quotes.length === 0) return;
  const start = new Date(new Date().getFullYear(),0,0);
  const diff = new Date() - start;
  const oneDay = 1000*60*60*24;
  const dayOfYear = Math.floor(diff/oneDay);
  const quote = quotes[dayOfYear % quotes.length];
  dailyQuoteElement.textContent = quote ? quote.text : 'Have a great day!';
}

function getRandomBatch() {
  const shuffled = [...words].sort(() => 0.5 - Math.random());
  return shuffled.slice(0, wordsPerPage);
}

function createCards(list, highlight = '') {
  cardsContainer.innerHTML = '';
  if(list.length === 0){
    cardsContainer.innerHTML = '<p>No words found.</p>';
    return;
  }
  list.forEach(word => {
    const shouldAutoOpen = highlight && (!word.w.toLowerCase().includes(highlight)) && (word.en.toLowerCase().includes(highlight) || word.te.toLowerCase().includes(highlight));
    const card = document.createElement('div');
    card.className = 'card';
    const audioHTML = word.audio ? `<audio controls src='${word.audio}'></audio>` : '';

    const regex = highlight ? new RegExp(`(${highlight})`, 'gi') : null;
    const wordDisplay = highlight ? word.w.replace(regex, '<mark>$1</mark>') : word.w;
    const meaningDisplay = highlight
      ? word.en.replace(regex, '<mark>$1</mark>') + '<br>' + word.te.replace(regex, '<mark>$1</mark>')
      : word.en + '<br>' + word.te;

    card.innerHTML = `
      <div class='word'>${wordDisplay}</div>
      <div class='meaning'>${meaningDisplay}<span class='pronunciation'>${word.p}</span></div>
      ${audioHTML}
        <div class='card-face card-back'>
          <div class='meaning'>${meaningDisplay}<span class='pronunciation'>${word.p}</span></div>
          ${audioHTML}
        </div>
      </div>
    `;

    // Initially hide meaning
    
    const meaningElem = card.querySelector('.meaning');

    if(shouldAutoOpen){
      meaningElem.style.display = 'block';
    }

    card.addEventListener('click', () => {
      meaningElem.style.display = meaningElem.style.display === 'block' ? 'none' : 'block';
    });

    cardsContainer.appendChild(card);
  });
}

function refreshWords() {
  currentBatch = getRandomBatch();
  createCards(currentBatch);
}

searchInput.addEventListener('input', e => {
  const query = e.target.value.toLowerCase();
  if(!query) {
    createCards(currentBatch);
    return;
  }
  const filtered = words.filter(w => w.w.toLowerCase().includes(query) || w.en.toLowerCase().includes(query) || w.te.toLowerCase().includes(query));
  createCards(filtered, query);
});

refreshButton.addEventListener('click', refreshWords);

const toggleBtn = document.getElementById('toggleTheme');
const savedTheme = localStorage.getItem('theme');
if(savedTheme === 'dark') document.body.classList.add('dark');

toggleBtn.addEventListener('click', () => {
  document.body.classList.toggle('dark');
  const isDark = document.body.classList.contains('dark');
  toggleBtn.textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
});
updateDailyQuote();
refreshWords();
</script>
</body>
</html>
